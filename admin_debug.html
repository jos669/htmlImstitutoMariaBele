<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Acceso Administrativo - Instituto María Belén Medrano</title>
    <!-- CSS principal -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --font: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto;
            border: 3px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="login-wrapper" style="min-height: 90vh;">
            <div class="login-card" style="border-top: 4px solid var(--primary-dark); position: relative;">
                <button type="button" id="theme-toggle" style="position: absolute; top: 1rem; right: 1rem; background: var(--primary-bg); border: 1px solid var(--border); font-size: 1.1rem; cursor: pointer; color: var(--text-muted); padding: 0.4rem 0.6rem; z-index: 10; border-radius: var(--radius-sm);" title="Cambiar tema claro/oscuro">🌓</button>
                <div class="login-header">
                    <img src="/static/logo.png" alt="Logo" style="height: 120px; width: 120px; object-fit: contain; margin-bottom: 1rem;">
                    <h2>Acceso Administrativo</h2>
                    <p>Portal de Control de Expedientes Académicos</p>
                </div>

                <div id="error-alert" class="alert alert-danger" style="display: none; margin-bottom: 1.5rem;"></div>

                <form id="admin-login-form">
                    <div class="form-group">
                        <label for="admin-username" class="form-label">Usuario / CUI Administrativo:</label>
                        <input type="text" id="admin-username" class="form-control" placeholder="Ej. admin" required autocomplete="username" style="padding: 0.8rem 1rem;">
                    </div>

                    <div class="form-group" style="position: relative;">
                        <label for="admin-password" class="form-label">Contraseña:</label>
                        <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" style="padding: 0.8rem 1rem; padding-right: 2.5rem;">
                        <button type="button" id="toggle-password" style="position: absolute; right: 0.75rem; bottom: 0.65rem; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted); padding: 0.25rem; line-height: 1;" tabindex="-1">👁️</button>
                    </div>

                    <button type="submit" id="btn-login-submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; font-size: 1rem; border-radius: 8px; background-color: var(--primary-dark);">
                        🔑 INICIAR SESIÓN ADMIN
                    </button>
                </form>

                <div style="text-align: center; margin-top: 2rem;">
                    <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.95rem;">
                        ⬅️ Volver al Portal de Estudiantes
                    </a>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Instituto María Belén Medrano - Sistema de Certificación Escolar. Ciudad de Guatemala.</p>
    </footer>

    <script>
        // Cargar tema inmediatamente
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        // Configurar toggle de tema
        const toggleBtn = document.getElementById('theme-toggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
        }

        const loginForm = document.getElementById('admin-login-form');
        const usernameInput = document.getElementById('admin-username');
        const passwordInput = document.getElementById('admin-password');
        const submitBtn = document.getElementById('btn-login-submit');
        const errorAlert = document.getElementById('error-alert');
        const togglePassword = document.getElementById('toggle-password');

        if (togglePassword) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePassword.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
            });
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.style.display = 'none';
            submitBtn.classList.add('btn-loading');

            const cui = usernameInput.value.trim();
            const password = passwordInput.value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cui, password }),
                    cache: 'no-store'
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (jsonErr) {
                    console.error("Error al decodificar JSON de la respuesta:", jsonErr);
                }

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error(data.error || 'Credenciales administrativas incorrectas.');
                    } else if (response.status === 403) {
                        throw new Error(data.error || 'No tiene permisos para acceder a esta sección.');
                    } else {
                        throw new Error(data.error || 'Error en el servidor al intentar iniciar sesión.');
                    }
                }

                if (data.user && data.user.rol === 'admin') {
                    window.location.href = '/admin';
                } else {
                    throw new Error('Esta cuenta no tiene privilegios de administrador.');
                }

            } catch (err) {
                console.error("Error login admin:", err);
                errorAlert.textContent = err.message || 'Error de comunicación con el servidor.';
                errorAlert.style.display = 'block';
            } finally {
                submitBtn.classList.remove('btn-loading');
            }
        });
    </script>
</body>
</html>
